name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: mvn test --batch-mode

      - name: Run integration tests
        run: mvn verify --batch-mode -DskipTests
        # -DskipTests skips Surefire (unit tests already ran above)
        # Failsafe still runs *IT.java at the integration-test phase
        # Docker is pre-installed on ubuntu-latest — Testcontainers works with no extra config
